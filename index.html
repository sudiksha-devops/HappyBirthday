<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
    overflow:hidden;
}

.container{
    text-align:center;
    color:white;
    z-index:2;
}

h1{
    font-size:4rem;
    animation:glow 2s infinite alternate;
}

h2{
    margin-top:10px;
    font-size:2rem;
}

p{
    margin-top:20px;
    font-size:1.2rem;
}

button{
    margin-top:30px;
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    background:white;
    color:#ff4081;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
}

#message{
    margin-top:20px;
    font-size:1.5rem;
    display:none;
    animation:fadeIn 1s;
}

.balloon{
    position:absolute;
    bottom:-150px;
    width:70px;
    height:90px;
    border-radius:50%;
    animation:float 12s infinite;
}

.balloon::after{
    content:"";
    position:absolute;
    width:2px;
    height:80px;
    background:white;
    left:50%;
    top:90px;
}

.red{background:#ff4d4d; left:10%; animation-delay:0s;}
.blue{background:#4da6ff; left:30%; animation-delay:2s;}
.green{background:#66ff66; left:50%; animation-delay:4s;}
.yellow{background:#ffd633; left:70%; animation-delay:6s;}
.pink{background:#ff66cc; left:90%; animation-delay:8s;}

@keyframes float{
    0%{
        transform:translateY(0);
    }
    100%{
        transform:translateY(-120vh);
    }
}

@keyframes glow{
    from{
        text-shadow:0 0 10px white;
    }
    to{
        text-shadow:0 0 25px yellow,0 0 50px pink;
    }
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<div class="balloon red"></div>
<div class="balloon blue"></div>
<div class="balloon green"></div>
<div class="balloon yellow"></div>
<div class="balloon pink"></div>

<div class="container">
    <h1>🎉 Happy Birthday! 🎂</h1>
    <h2>Dear <span id="name">Shilpa</span> ❤️</h2>

    <p>
        Cheers... to beautiful 27 years..
    </p>

    <button onclick="showMessage()">
        🎁 Open Your Surprise
    </button>

    <div id="message">
        🎊 Wishing you endless happiness, success, love, and unforgettable memories.
        May this year bring all your dreams to life!You are amazing! May your smile shine brighter than ever.
        Have a wonderful birthday! 🎂🎈💖
      
    </div>
</div>

<script>
function showMessage(){
    document.getElementById("message").style.display="block";
}
</script>

</body>
</html>
